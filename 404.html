<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Halaman Tidak Ditemukan | Portal Materi MI Al Irsyad</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --forest-900: #103726;
        --forest-700: #1b7248;
        --bg: #eef6f1;
        --text: #18241d;
        --soft: #55685d;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 1rem;
        font-family: "DM Sans", sans-serif;
        background:
          radial-gradient(circle at top left, rgba(255, 255, 255, 0.86), transparent 24%),
          linear-gradient(145deg, #e6f2e9, var(--bg));
        color: var(--text);
      }

      main {
        width: min(620px, 100%);
        padding: 2rem;
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.92);
        border: 1px solid rgba(16, 55, 38, 0.12);
        box-shadow: 0 24px 54px rgba(16, 55, 38, 0.12);
        text-align: center;
      }

      h1 {
        margin: 0;
        font-family: "Space Grotesk", sans-serif;
        font-size: clamp(1.8rem, 2vw + 1rem, 2.6rem);
      }

      p {
        color: var(--soft);
        line-height: 1.65;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 48px;
        padding: 0.8rem 1rem;
        border-radius: 999px;
        text-decoration: none;
        color: #fff;
        font-weight: 800;
        background: linear-gradient(145deg, var(--forest-700), var(--forest-900));
      }
    </style>
  </head>
  <body>
    <main>
      <p>404</p>
      <h1>Halaman yang kamu cari tidak ditemukan.</h1>
      <p>
        Tautan mungkin berubah atau materi belum tersedia. Kembali ke portal utama untuk
        memilih kelas dan membuka materi yang aktif.
      </p>
      <a href="/index.html">Kembali ke Portal</a>
    </main>
  </body>
</html>
